<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balloonize Prototype</title>
    <style>
        body {
            margin: 0;
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: sans-serif;
            color: #fff;
        }
        
        .canvas-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        canvas {
            width: 256px;  /* Dense CSS Size */
            height: 256px;
            background: transparent;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            touch-action: none;
            cursor: pointer;
        }

        .instructions {
            opacity: 0.7;
            font-size: 14px;
            text-align: center;
            pointer-events: none;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: rgba(255, 255, 255, 0.05);
            padding: 16px;
            border-radius: 12px;
            width: 256px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .control-group label {
            font-size: 12px;
            display: flex;
            justify-content: space-between;
            color: #aaa;
        }

        .control-group input[type="range"] {
            width: 100%;
            accent-color: #ff4b8b;
        }
    </style>
</head>
<body>
    <div class="canvas-container">
        <!-- High res output canvas, simulation is run at a lower res for performance -->
        <canvas id="glcanvas" width="512" height="512"></canvas>
        <div class="instructions">Click and drag over the shape to interact with the wave simulation.</div>
        
        <div class="controls">
            <!-- Physics Controls -->
            <div style="font-size:14px; font-weight:bold; margin-bottom:-4px;">Physics</div>
            <div class="control-group">
                <label><span>Wave Speed (Tension)</span> <span id="val-tension">0.70</span></label>
                <input type="range" id="slider-tension" min="0.1" max="0.7" step="0.01" value="0.70">
            </div>
            <div class="control-group">
                <label><span>Damping (Friction)</span> <span id="val-damping">0.67</span></label>
                <input type="range" id="slider-damping" min="0.5" max="0.99" step="0.01" value="0.67">
            </div>
            <div class="control-group">
                <label><span>Diffusion (Smoothness)</span> <span id="val-diffusion">0.15</span></label>
                <input type="range" id="slider-diffusion" min="0.0" max="0.2" step="0.01" value="0.15">
            </div>

            <!-- Lighting Controls -->
            <div style="font-size:14px; font-weight:bold; margin-top:8px; margin-bottom:-4px;">Lighting</div>
            <div class="control-group">
                <label><span>Env Intensity</span> <span id="val-env">1.4</span></label>
                <input type="range" id="slider-env" min="0.0" max="3.0" step="0.1" value="1.4">
            </div>
            <div class="control-group">
                <label><span>Light Azimuth</span> <span id="val-azimuth">-45</span></label>
                <input type="range" id="slider-azimuth" min="-180" max="180" step="1" value="-45">
            </div>
            <div class="control-group">
                <label><span>Light Elevation</span> <span id="val-elevation">39</span></label>
                <input type="range" id="slider-elevation" min="-90" max="90" step="1" value="39">
            </div>
            <div class="control-group">
                <label><span>Specular Core</span> <span id="val-spec-core">10.0</span></label>
                <input type="range" id="slider-spec-core" min="0.0" max="10.0" step="0.1" value="10.0">
            </div>
            <div class="control-group">
                <label><span>Specular Glow</span> <span id="val-spec-glow">3.2</span></label>
                <input type="range" id="slider-spec-glow" min="0.0" max="10.0" step="0.1" value="3.2">
            </div>
            <div class="control-group">
                <label><span>Rim Light</span> <span id="val-rim">0.2</span></label>
                <input type="range" id="slider-rim" min="0.0" max="2.0" step="0.1" value="0.2">
            </div>
        </div>
    </div>

    <script type="module">
        import { BalloonizeEngine } from './engine.js';

        window.addEventListener('DOMContentLoaded', () => {
            const canvas = document.getElementById('glcanvas');
            
            // Create a temporary canvas to generate a fun default image
            const tmpCanvas = document.createElement('canvas');
            tmpCanvas.width = 512;
            tmpCanvas.height = 512;
            const ctx = tmpCanvas.getContext('2d');
            
            // Clear to transparent
            ctx.clearRect(0, 0, 512, 512);
            
            // Draw a shiny gradient shape
            const gradient = ctx.createRadialGradient(200, 200, 20, 256, 256, 240);
            gradient.addColorStop(0, '#ff4b8b');
            gradient.addColorStop(0.5, '#cf0055');
            gradient.addColorStop(1, '#4a001a');
            
            ctx.fillStyle = gradient;
            ctx.beginPath();
            // A somewhat interesting blobby shape or just a simple circle
            ctx.arc(256, 256, 200, 0, Math.PI * 2);
            ctx.fill();

            // Render text
            ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
            ctx.font = 'bold 80px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('BALLOON', 256, 256);
            
            const dataUrl = tmpCanvas.toDataURL('image/png');
            
            // Initialize the modular engine with this canvas and the generated image
            const engine = new BalloonizeEngine(canvas, dataUrl);
        });
    </script>
</body>
</html>
