<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balloonize Prototype</title>
    <style>
        body {
            margin: 0;
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: sans-serif;
            color: #fff;
        }
        
        .canvas-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        canvas {
            width: 256px;  /* Dense CSS Size */
            height: 256px;
            background: transparent;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            touch-action: none;
            cursor: pointer;
        }

        .instructions {
            opacity: 0.7;
            font-size: 14px;
            text-align: center;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="canvas-container">
        <!-- High res output canvas, simulation is run at a lower res for performance -->
        <canvas id="glcanvas" width="512" height="512"></canvas>
        <div class="instructions">Click and drag over the shape to interact with the wave simulation.</div>
    </div>

    <script type="module">
        import { BalloonizeEngine } from './engine.js';

        window.addEventListener('DOMContentLoaded', () => {
            const canvas = document.getElementById('glcanvas');
            
            // Create a temporary canvas to generate a fun default image
            const tmpCanvas = document.createElement('canvas');
            tmpCanvas.width = 512;
            tmpCanvas.height = 512;
            const ctx = tmpCanvas.getContext('2d');
            
            // Clear to transparent
            ctx.clearRect(0, 0, 512, 512);
            
            // Draw a shiny gradient shape
            const gradient = ctx.createRadialGradient(200, 200, 20, 256, 256, 240);
            gradient.addColorStop(0, '#ff4b8b');
            gradient.addColorStop(0.5, '#cf0055');
            gradient.addColorStop(1, '#4a001a');
            
            ctx.fillStyle = gradient;
            ctx.beginPath();
            // A somewhat interesting blobby shape or just a simple circle
            ctx.arc(256, 256, 200, 0, Math.PI * 2);
            ctx.fill();

            // Render text
            ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
            ctx.font = 'bold 80px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('BALLOON', 256, 256);
            
            const dataUrl = tmpCanvas.toDataURL('image/png');
            
            // Initialize the modular engine with this canvas and the generated image
            const engine = new BalloonizeEngine(canvas, dataUrl);
        });
    </script>
</body>
</html>
