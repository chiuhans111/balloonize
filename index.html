<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Google tag (gtag.js) -->

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balloonize - balloonmorphism.</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    <!-- Open Graph / Cover Meta Tags -->
    <meta property="og:title" content="Balloonize — Realistic 3D Mylar Balloon WebGL Simulator">
    <meta property="og:description"
          content="Inflate and interact with realistic 3D mylar balloons in your browser. Drag and drop any image to simulate WebGL physics, lighting, and waves.">
    <meta property="og:image" content="https://chiuhans111.github.io/balloonize/cover.jpg">
    <meta property="og:url" content="https://chiuhans111.github.io/balloonize/">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://chiuhans111.github.io/balloonize/cover.jpg">
    <!-- Google Fonts: Fredoka (Playful) & Outfit (Minimalist Clean) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@600;700&family=Outfit:wght@300;400;500;600&display=swap"
          rel="stylesheet">
    <style>
        :root {
            --font-playful: 'Fredoka', sans-serif;
            --font-clean: 'Outfit', sans-serif;
            --bg-color: #0d0d11;
            --accent-color: #ff7a59;
            /* Modern soft orange peach */
            --accent-hover: #ff8d71;
            --text-color: #f1f1f7;
            --text-muted: #8a8a9d;
            --panel-bg: rgba(255, 255, 255, 0.03);
            --panel-border: rgba(255, 255, 255, 0.07);
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-clean);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
        }

        .main-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 100%;
            max-width: 400px;
            padding: 24px;
            box-sizing: border-box;
        }

        .header {
            text-align: center;
            margin-bottom: 8px;
            width: 100%;
        }

        .header h1 {
            font-family: var(--font-playful);
            font-size: 38px;
            font-weight: 700;
            margin: 0 0 4px 0;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--accent-color), #ff527b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header .subtitle {
            font-size: 13px;
            color: var(--text-muted);
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            font-weight: 500;
        }

        .header .inspired {
            font-size: 11px;
            color: var(--text-muted);
            opacity: 0.65;
            margin: 6px 0 0 0;
            letter-spacing: 0.5px;
            font-weight: 400;
        }

        .header h1 a {
            text-decoration: none;
            color: inherit;
            display: inline-block;
            transition: opacity 0.2s ease;
        }

        .header h1 a:hover {
            opacity: 0.85;
        }

        .header .subtitle a {
            text-decoration: none;
            color: inherit;
            transition: color 0.2s ease;
        }

        .header .subtitle a:hover {
            color: var(--accent-color);
        }

        .canvas-wrapper {
            position: relative;
            width: 360px;
            height: 360px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        canvas {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            background: transparent;
            border-radius: 36px;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.6),
                0 0 0 1px var(--panel-border);
            touch-action: none;
            cursor: pointer;
            transition: transform 0.2s ease;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        canvas:hover {
            transform: scale(1.01);
        }

        .instructions {
            color: var(--text-muted);
            font-size: 13px;
            text-align: center;
            pointer-events: none;
            margin-top: -4px;
            line-height: 1.5;
        }

        .upload-section {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .btn-upload {
            background: var(--accent-color);
            color: #fff;
            font-family: var(--font-clean);
            font-weight: 600;
            border: none;
            padding: 12px 28px;
            border-radius: 14px;
            cursor: pointer;
            font-size: 15px;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 20px rgba(255, 122, 89, 0.2);
            width: 100%;
            text-align: center;
        }

        .btn-upload:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 12px 24px rgba(255, 122, 89, 0.35);
        }

        .btn-upload:active {
            transform: translateY(1px);
        }

        /* Collapsible Tuning Panel */
        .tuning-wrapper {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toggle-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-family: var(--font-clean);
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            padding: 6px 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: opacity 0.2s ease;
            width: auto;
            margin: 0 auto;
            opacity: 0.5;
        }

        .toggle-btn:hover {
            opacity: 0.9;
        }

        .toggle-btn .arrow {
            font-size: 9px;
            transition: transform 0.3s ease;
        }

        .toggle-btn.active .arrow {
            transform: rotate(180deg);
        }

        .settings-panel {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 16px;
            padding: 0 18px;
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1),
                padding 0.4s cubic-bezier(0.4, 0, 0.2, 1),
                opacity 0.3s ease;
            display: flex;
            flex-direction: column;
            gap: 14px;
            box-sizing: border-box;
        }

        .settings-panel.open {
            padding: 18px;
            max-height: 580px;
            opacity: 1;
        }

        .section-title {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent-color);
            margin: 4px 0 0 0;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .control-group label {
            font-size: 12px;
            display: flex;
            justify-content: space-between;
            color: var(--text-muted);
            font-weight: 500;
        }

        .control-group label span.val-badge {
            color: var(--text-color);
            font-weight: 600;
            background: rgba(255, 255, 255, 0.06);
            padding: 1px 6px;
            border-radius: 6px;
            font-size: 11px;
        }

        .control-group input[type="range"] {
            width: 100%;
            accent-color: var(--accent-color);
            background: rgba(255, 255, 255, 0.08);
            height: 4px;
            border-radius: 2px;
            outline: none;
            border: none;
            -webkit-appearance: none;
        }

        .control-group input[type="range"]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
        }

        .control-group input[type="range"]::-webkit-slider-thumb {
            height: 14px;
            width: 14px;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
            -webkit-appearance: none;
            margin-top: -5px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
            transition: transform 0.1s ease;
        }

        .control-group input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }
    </style>
</head>

<body>
    <div class="main-container">
        <!-- Header -->
        <div class="header">
            <h1><a href="https://github.com/chiuhans111/balloonize" target="_blank">Balloonize</a></h1>
            <p class="subtitle">by <a href="https://x.com/chiu_hans" target="_blank">hanschiu</a></p>
            <div
                 style="margin-top: 8px; display: flex; justify-content: center; align-items: center; min-height: 20px;">
                <iframe src="https://ghbtns.com/github-btn.html?user=chiuhans111&repo=balloonize&type=star&count=true"
                        frameborder="0" scrolling="0" width="75" height="20" title="GitHub"
                        style="filter: invert(1) hue-rotate(180deg); opacity: 0.7; transition: opacity 0.2s ease; border: none;"
                        onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.7'"></iframe>
            </div>
            <p class="inspired">balloonmorphism &bull; inspired by figma</p>
        </div>

        <!-- Canvas -->
        <div class="canvas-wrapper">
            <canvas id="glcanvas" width="512" height="512"></canvas>
        </div>

        <!-- Interaction Instructions -->
        <div class="instructions">
            Tickle the balloon to see it wobble!
        </div>

        <!-- Mask Tuning UI (Outside Panel) -->
        <div class="control-group" style="margin-top: 15px; width: 100%;">
            <label><span>Threshold</span> <span class="val-badge" id="val-mask-threshold">0.75</span></label>
            <input type="range" id="slider-mask-threshold" min="0.0" max="1.0" step="0.01" value="0.75">
        </div>

        <!-- Image Actions -->
        <div class="upload-section" style="margin-top: 10px; width: 100%; display: flex; gap: 10px;">
            <button class="btn-upload" id="btn-upload" style="flex: 1; margin: 0;">Open New Image</button>
            <button class="btn-upload" id="btn-download"
                    style="flex: 1; margin: 0; background: rgba(255, 255, 255, 0.06); color: var(--text-color); border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: none; transition: all 0.2s;"
                    onmouseover="this.style.background='rgba(255, 255, 255, 0.12)'; this.style.borderColor='rgba(255, 255, 255, 0.2)';"
                    onmouseout="this.style.background='rgba(255, 255, 255, 0.06)'; this.style.borderColor='rgba(255, 255, 255, 0.1)';">Save
                Image </button>
            <input type="file" id="file-input" accept="image/*" style="display:none;">
        </div>


        <!-- Collapsible Tuning Parameters -->
        <div class="tuning-wrapper" style="width: 100%; margin-top: 16px;">
            <button class="toggle-btn" id="toggle-settings">
                Tuning Pump (Devs Only) <span class="arrow">↓</span>
            </button>

            <div class="settings-panel" id="settings-panel">
                <!-- Physics -->
                <div class="section-title">Latex Physics</div>
                <div class="control-group">
                    <label><span>Elastic Resistance (Tension)</span> <span class="val-badge"
                              id="val-tension">0.70</span></label>
                    <input type="range" id="slider-tension" min="0.1" max="0.7" step="0.01" value="0.70">
                </div>
                <div class="control-group">
                    <label><span>Air Viscosity (Damping)</span> <span class="val-badge"
                              id="val-damping">0.67</span></label>
                    <input type="range" id="slider-damping" min="0.5" max="0.99" step="0.01" value="0.67">
                </div>
                <div class="control-group">
                    <label><span>Bounciness (Smoothness)</span> <span class="val-badge"
                              id="val-diffusion">0.15</span></label>
                    <input type="range" id="slider-diffusion" min="0.0" max="0.2" step="0.01" value="0.15">
                </div>

                <!-- Lighting -->
                <div class="section-title" style="margin-top: 6px;">Lighting</div>
                <div class="control-group">
                    <label><span>Env Intensity</span> <span class="val-badge" id="val-env">1.4</span></label>
                    <input type="range" id="slider-env" min="0.0" max="3.0" step="0.1" value="1.4">
                </div>
                <div class="control-group">
                    <label><span>Light Azimuth</span> <span class="val-badge" id="val-azimuth">-45</span></label>
                    <input type="range" id="slider-azimuth" min="-180" max="180" step="1" value="-45">
                </div>
                <div class="control-group">
                    <label><span>Light Elevation</span> <span class="val-badge" id="val-elevation">56</span></label>
                    <input type="range" id="slider-elevation" min="-90" max="90" step="1" value="56">
                </div>
                <div class="control-group">
                    <label><span>Specular Core</span> <span class="val-badge" id="val-spec-core">6.7</span></label>
                    <input type="range" id="slider-spec-core" min="0.0" max="10.0" step="0.1" value="6.7">
                </div>
                <div class="control-group">
                    <label><span>Specular Glow</span> <span class="val-badge" id="val-spec-glow">1.0</span></label>
                    <input type="range" id="slider-spec-glow" min="0.0" max="10.0" step="0.1" value="1.0">
                </div>
                <div class="control-group">
                    <label><span>Rim Light</span> <span class="val-badge" id="val-rim">0.5</span></label>
                    <input type="range" id="slider-rim" min="0.0" max="2.0" step="0.1" value="0.5">
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { BalloonizeEngine } from './engine.js';

        // Wait for web fonts to load to avoid text rendering glitches in 2D canvas
        document.fonts.ready.then(() => {
            const canvas = document.getElementById('glcanvas');

            // Create a temporary canvas to generate a modern default balloon image
            const tmpCanvas = document.createElement('canvas');
            tmpCanvas.width = 512;
            tmpCanvas.height = 512;
            const ctx = tmpCanvas.getContext('2d');

            ctx.clearRect(0, 0, 512, 512);

            // Beautiful modern peach-orange gradient
            const gradient = ctx.createRadialGradient(200, 200, 20, 256, 256, 240);
            gradient.addColorStop(0, '#ff9f7e'); // Soft peach orange
            gradient.addColorStop(0.5, '#ff5e7b'); // Soft pinkish coral
            gradient.addColorStop(1, '#5d0b1a'); // Dark warm ruby shadow

            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(256, 256, 205, 0, Math.PI * 2);
            ctx.fill();

            // Render playful playful text
            ctx.fillStyle = 'rgba(255, 255, 255, 0.95)';
            ctx.font = 'bold 76px Fredoka';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('Balloonize', 256, 256);

            const dataUrl = tmpCanvas.toDataURL('image/png');

            // Initialize the modular engine
            const engine = new BalloonizeEngine(canvas, dataUrl, {
                inflationDepth: 1.0,
                physicsParams: { tension: 0.70, damping: 0.67, diffusion: 0.15 },
                lightingParams: { env: 1.4, az: -45, el: 56, specCore: 6.7, specGlow: 1.0, rim: 0.5 }
            });

            // Handle collapsible Tuning Parameters panel
            const toggleBtn = document.getElementById('toggle-settings');
            const settingsPanel = document.getElementById('settings-panel');
            toggleBtn.addEventListener('click', () => {
                const isOpen = settingsPanel.classList.toggle('open');
                toggleBtn.classList.toggle('active', isOpen);
                toggleBtn.querySelector('.arrow').textContent = isOpen ? '↑' : '↓';
            });

            // File selection
            const btnUpload = document.getElementById('btn-upload');
            const btnDownload = document.getElementById('btn-download');
            const fileInput = document.getElementById('file-input');
            btnUpload.addEventListener('click', () => fileInput.click());
            fileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    engine.setImage(file).catch(err => console.error("Error setting image from file input:", err));
                }
            });

            if (btnDownload) {
                btnDownload.addEventListener('click', () => {
                    const link = document.createElement('a');
                    link.download = 'balloon.png';
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                });
            }

            // Drag and drop
            window.addEventListener('dragover', (e) => {
                e.preventDefault();
            });
            window.addEventListener('drop', (e) => {
                e.preventDefault();
                const file = e.dataTransfer.files[0];
                if (file && file.type.startsWith('image/')) {
                    engine.setImage(file).catch(err => console.error("Error setting image from drag-drop:", err));
                }
            });

            // Clipboard paste
            window.addEventListener('paste', (e) => {
                const items = (e.clipboardData || e.originalEvent.clipboardData).items;
                for (let i = 0; i < items.length; i++) {
                    if (items[i].type.indexOf('image') !== -1) {
                        const file = items[i].getAsFile();
                        engine.setImage(file).catch(err => console.error("Error setting image from clipboard paste:", err));
                        break;
                    }
                }
            });
        });
    </script>
</body>

</html>
